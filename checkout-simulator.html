<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Alumni Mail - Secure Gateway</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #131313;
            color: #e2e2e2;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .brushed-metal-btn {
            background: linear-gradient(180deg, #FFF 0%, #E2E2E2 100%);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.4);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }
        .brushed-metal-btn::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.05) 1%, rgba(255, 255, 255, 0) 2%);
            pointer-events: none;
        }
        .brushed-metal-btn:active {
            transform: scale(0.98);
            background: linear-gradient(180deg, #E2E2E2 0%, #CCC 100%);
        }
        .input-mercury {
            border: none;
            border-bottom: 1px solid #444748;
            background: transparent;
            transition: border-color 0.3s ease;
        }
        .input-mercury:focus {
            outline: none;
            border-bottom: 1px solid #FFF;
            box-shadow: none;
        }
        .grain-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            opacity: 0.03;
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuDeEMWeFVqurmcPOIQ0s5t3GcqPIE9e7TvRW_BliWUFBYJYnbQJbBEuu64j6UtfErNcOsuCVYYIvJWgiv2U-3WQbXbU25cEh4OeF0NFqlwNO-NWcT6uyPa2RLwr-zD3Q2ezQ6vhuFWTUQCkhFNO2gRWICK9IOoAOh2bOuVzowFGU124XjY1OfZT7i3TBypBUgO_TlPL753gRhKG9UCtTnqQWoh506HBRnR8vUHRRTp-jwpFf_VJ5HU3TaScT--Xf_61bCLyI4Eoif5z);
        }
        .micro-bevel {
            box-shadow: inset 1px 1px 1px rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
    <div class="grain-overlay"></div>
    
    <main class="w-full max-w-md bg-surface-container-low border border-outline-variant p-8 micro-bevel flex flex-col gap-6 relative z-10">
        <!-- Gateway Header -->
        <div class="flex flex-col items-center text-center gap-2">
            <span class="material-symbols-outlined text-4xl text-primary animate-pulse">lock</span>
            <div>
                <h1 class="font-headline-lg-mobile text-[20px] font-bold text-primary tracking-tighter uppercase">ALUMNI SECURE PORTAL</h1>
                <p class="font-label-caps text-label-caps text-outline mt-1 uppercase tracking-widest text-[10px]">Stripe Checkout Sandbox</p>
            </div>
        </div>

        <div class="h-[1px] bg-outline-variant/30"></div>

        <!-- Transaction summary -->
        <div class="flex flex-col gap-3 bg-surface-container p-4 border border-outline-variant/50 rounded-sm">
            <div class="flex justify-between items-center">
                <span class="font-label-caps text-label-caps text-outline uppercase text-[11px]">Account ID</span>
                <span id="display-username" class="font-body-md text-primary font-semibold font-mono">...</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="font-label-caps text-label-caps text-outline uppercase text-[11px]">Subscription Tier</span>
                <span id="display-tier" class="font-label-caps text-label-caps text-primary px-2 py-0.5 bg-surface-container-high rounded-sm">...</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="font-label-caps text-label-caps text-outline uppercase text-[11px]">Billing Cycle</span>
                <span id="display-cycle" class="font-label-caps text-label-caps text-outline uppercase text-[11px]">...</span>
            </div>
            <div class="h-[1px] bg-outline-variant/30 my-1"></div>
            <div class="flex justify-between items-center">
                <span class="font-body-lg text-primary font-bold">Total Amount Due</span>
                <span id="display-price" class="font-headline-lg-mobile text-[22px] text-primary font-bold">...</span>
            </div>
        </div>

        <!-- Simulated Card Details Form -->
        <form id="payment-form" onsubmit="processSimulatedPayment(event)" class="flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <label class="font-label-caps text-label-caps text-outline-variant uppercase text-[10px]" for="card-holder">Cardholder Name</label>
                <input type="text" id="card-holder" class="input-mercury w-full py-1 text-on-surface font-body-md" value="Alumni Member" required />
            </div>
            
            <div class="flex flex-col gap-1">
                <label class="font-label-caps text-label-caps text-outline-variant uppercase text-[10px]" for="card-num">Card Number</label>
                <input type="text" id="card-num" class="input-mercury w-full py-1 text-on-surface font-body-md font-mono" value="4111 •••• •••• 8888" disabled />
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="font-label-caps text-label-caps text-outline-variant uppercase text-[10px]" for="card-expiry">Expiry Date</label>
                    <input type="text" id="card-expiry" class="input-mercury w-full py-1 text-on-surface font-body-md font-mono" value="12/29" disabled />
                </div>
                <div class="flex flex-col gap-1">
                    <label class="font-label-caps text-label-caps text-outline-variant uppercase text-[10px]" for="card-cvc">CVC Code</label>
                    <input type="password" id="card-cvc" class="input-mercury w-full py-1 text-on-surface font-body-md font-mono" value="•••" disabled />
                </div>
            </div>

            <button type="submit" class="brushed-metal-btn w-full py-3 text-on-primary font-label-caps text-label-caps uppercase tracking-widest mt-4">
                Authenticate & Pay
            </button>
            
            <button type="button" onclick="cancelPayment()" class="text-center font-label-caps text-[11px] text-outline hover:text-primary transition-colors uppercase py-1 mt-1 border-b border-transparent hover:border-primary w-fit mx-auto">
                Cancel & Return
            </button>
        </form>
    </main>

    <!-- Gateway Footer -->
    <footer class="mt-8 flex flex-col items-center justify-center opacity-40">
        <div class="flex items-center space-x-2">
            <span class="material-symbols-outlined text-[14px]">shield</span>
            <span class="font-label-caps text-[10px] tracking-[0.15em] uppercase">Simulated SECURE Node</span>
        </div>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get('username') || 'member@alumnimail.app';
        const tier = params.get('tier') || 'Pro';
        const billingCycle = params.get('billingCycle') || 'yearly';

        document.getElementById('display-username').innerText = username;
        document.getElementById('display-tier').innerText = tier.toUpperCase();
        document.getElementById('display-cycle').innerText = billingCycle;

        // Pricing lookup
        const prices = {
            'Pro': { 'monthly': '$3.99', 'yearly': '$38.00' },
            'Enterprise': { 'monthly': '$15.00', 'yearly': '$144.00' },
            'Ultimate': { 'monthly': '$9.99', 'yearly': '$96.00' }
        };
        const price = prices[tier] ? prices[tier][billingCycle] : '$38.00';
        document.getElementById('display-price').innerText = price;

        function processSimulatedPayment(e) {
            e.preventDefault();
            const btn = document.querySelector('button[type="submit"]');
            btn.innerText = "VERIFYING CRYPTOGRAPHIC LEDGER...";
            btn.disabled = true;

            setTimeout(() => {
                const session_id = 'mock_stripe_sess_' + Math.random().toString(36).substr(2, 9);
                window.location.href = `/?stripe_checkout_success=true&session_id=${session_id}&username=${encodeURIComponent(username)}&tier=${tier}`;
            }, 1000);
        }

        function cancelPayment() {
            window.location.href = `/?stripe_checkout_cancel=true`;
        }
    </script>
</body>
</html>
